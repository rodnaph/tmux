# Automatically rename windows based on running command
set-option -g automatic-rename on

# Enable mouse support
set -g mouse on

# Session/window navigation
bind-key -n C-Up  switch-client -p
bind-key -n C-Down  switch-client -n
bind-key -n C-Left  previous-window
bind-key -n C-Right next-window

# Catppuccin theme for tmux
# Use window name (#W) instead of pane title (#T) which defaults to hostname
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

# Make the active window stand out
set -g @catppuccin_window_current_number_color "#{@thm_red}"
set -g @catppuccin_window_current_text_color "#{@thm_red}"
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Override active window text to black for readability
set -g @_ctp_w_text_style "#[fg=#{@thm_crust},bg=#{@catppuccin_window_current_text_color}]"
set -gF window-status-current-format \
  "#{E:@_ctp_w_number_style}#{E:@catppuccin_window_current_left_separator}#{@catppuccin_window_current_number}"
set -agF window-status-current-format "#{E:@catppuccin_window_current_middle_separator}"
set -agF window-status-current-format \
  "#{E:@_ctp_w_text_style}#{@catppuccin_window_current_text}#{@_ctp_w_flags}#{E:@catppuccin_window_current_right_separator}"
