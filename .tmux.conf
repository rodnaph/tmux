# Automatically rename windows based on running command
set-option -g automatic-rename on

# Enable auto focus
set -g focus-events on

# Enable mouse support
set -g mouse on

# Allow extended key sequences (kitty keyboard protocol) so that
# modifiers like Ctrl+Enter are forwarded to applications like Neovim
set -g extended-keys on
set -ga terminal-features ',xterm-ghostty:extkeys'

# Session/window navigation
bind-key -n C-Left  previous-window
bind-key -n C-Right next-window

# Theme
source-file ~/.config/tmux/theme.conf
